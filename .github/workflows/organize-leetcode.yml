name: Move LeetCode files

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: move-leetcode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  move-leetcode:
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest branch
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Move root LeetHub folders
        run: |
          python3 << 'PY'
          import re
          import shutil
          from pathlib import Path

          root = Path(".")
          leetcode_dir = root / "LeetCode"
          root_readme = root / "README.md"
          leetcode_readme = leetcode_dir / "README.md"

          problem_dir_name = re.compile(r"^\d+-")
          topics_block = re.compile(
              r"\n*<!---LeetCode Topics Start-->.*?<!---LeetCode Topics End-->\n*",
              re.DOTALL,
          )

          leetcode_dir.mkdir(exist_ok=True)

          moved = []
          for path in sorted(root.iterdir()):
              if not path.is_dir() or not problem_dir_name.match(path.name):
                  continue

              target = leetcode_dir / path.name
              if target.exists():
                  for item in path.iterdir():
                      destination = target / item.name
                      if destination.exists():
                          if destination.is_dir():
                              shutil.rmtree(destination)
                          else:
                              destination.unlink()

                      shutil.move(str(item), str(destination))

                  path.rmdir()
              else:
                  shutil.move(str(path), str(target))

              moved.append(path.name)
              print(f"Moved {path} -> {target}")

          if root_readme.exists():
              text = root_readme.read_text(encoding="utf-8")
              match = topics_block.search(text)

              if match:
                  topics = match.group(0).strip()
                  topics = re.sub(
                      r"(/tree/(?:main|master)/)(?!LeetCode/)",
                      r"\1LeetCode/",
                      topics,
                  )

                  if leetcode_readme.exists():
                      leetcode_text = leetcode_readme.read_text(encoding="utf-8")
                      if topics_block.search(leetcode_text):
                          leetcode_text = topics_block.sub(f"\n\n{topics}\n", leetcode_text)
                      else:
                          leetcode_text = leetcode_text.rstrip() + f"\n\n{topics}\n"
                  else:
                      leetcode_text = f"# LeetCode\n\n{topics}\n"

                  leetcode_readme.write_text(leetcode_text.rstrip() + "\n", encoding="utf-8")

                  cleaned_root_readme = topics_block.sub("\n\n", text).rstrip() + "\n"
                  root_readme.write_text(cleaned_root_readme, encoding="utf-8")
                  print("Moved LeetCode README block into LeetCode/README.md")

          if not moved:
              print("No root LeetHub folders found.")
          PY

      - name: Commit and push
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Move LeetCode files"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi

            echo "Push failed. Rebasing on latest ${GITHUB_REF_NAME} and retrying..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done

          echo "Push failed after 3 attempts."
          exit 1

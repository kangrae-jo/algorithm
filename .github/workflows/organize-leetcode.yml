name: Organize LeetCode folders

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  organize-leetcode:
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize LeetCode folders
        run: |
          python3 << 'PY'
          import re
          import shutil
          from pathlib import Path

          ROOT = Path(".")
          LEETCODE_DIR = ROOT / "LeetCode"

          # 절대 이동하면 안 되는 루트 폴더들
          IGNORE_DIRS = {
              ".git",
              ".github",
              "LeetCode",

              # 영어 폴더
              "Baekjoon",
              "Programmers",
              "SWEA",

              # 한글 폴더
              "백준",
              "프로그래머스",
          }

          def read_text_safe(path):
              try:
                  return path.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  return ""

          def get_readme_text(problem_dir):
              for name in ["README.md", "README.MD", "readme.md"]:
                  readme = problem_dir / name
                  if readme.exists() and readme.is_file():
                      return read_text_safe(readme)
              return ""

          def is_leetcode_problem_dir(path):
              if not path.is_dir():
                  return False

              if path.name in IGNORE_DIRS:
                  return False

              readme_text = get_readme_text(path)
              lower_text = readme_text.lower()

              # LeetHub가 만든 폴더인지 확인
              # README에 leetcode 관련 링크/문구가 없으면 건드리지 않음
              leetcode_markers = [
                  "leetcode",
                  "leetcode.com",
                  "difficulty:",
                  "difficulty",
              ]

              if not any(marker in lower_text for marker in leetcode_markers):
                  return False

              # 코드 파일이 하나 이상 있어야 문제 폴더로 판단
              code_exts = {
                  ".cpp", ".cc", ".cxx",
                  ".java",
                  ".py",
                  ".js",
                  ".ts",
                  ".go",
                  ".rs",
                  ".kt",
                  ".cs",
                  ".swift"
              }

              has_code = any(
                  child.is_file() and child.suffix in code_exts
                  for child in path.rglob("*")
              )

              return has_code

          def find_difficulty(problem_dir):
              text = get_readme_text(problem_dir).lower()

              if re.search(r"difficulty\s*[:|-]?\s*easy", text):
                  return "Easy"

              if re.search(r"difficulty\s*[:|-]?\s*medium", text):
                  return "Medium"

              if re.search(r"difficulty\s*[:|-]?\s*hard", text):
                  return "Hard"

              if re.search(r"\beasy\b", text):
                  return "Easy"

              if re.search(r"\bmedium\b", text):
                  return "Medium"

              if re.search(r"\bhard\b", text):
                  return "Hard"

              return "Unknown"

          LEETCODE_DIR.mkdir(exist_ok=True)

          moved = False

          for item in list(ROOT.iterdir()):
              if not is_leetcode_problem_dir(item):
                  continue

              difficulty = find_difficulty(item)
              target_dir = LEETCODE_DIR / difficulty
              target_dir.mkdir(parents=True, exist_ok=True)

              target = target_dir / item.name

              if target.exists():
                  for child in item.iterdir():
                      dest = target / child.name

                      if dest.exists():
                          if dest.is_dir():
                              shutil.rmtree(dest)
                          else:
                              dest.unlink()

                      shutil.move(str(child), str(dest))

                  item.rmdir()
              else:
                  shutil.move(str(item), str(target))

              print(f"Moved {item} -> {target}")
              moved = True

          if moved:
              print("LeetCode folders organized.")
          else:
              print("No LeetCode folders to organize.")
          PY

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Organize LeetCode folders"
            git push
          else
            echo "No changes to commit."
          fi

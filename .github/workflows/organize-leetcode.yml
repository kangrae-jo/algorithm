name: Organize LeetCode folders

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  organize-leetcode:
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move LeetHub output into LeetCode
        run: |
          python3 << 'PY'
          import re
          import shutil
          from pathlib import Path

          ROOT = Path(".")
          LEETCODE_DIR = ROOT / "LeetCode"
          MOVED_PATHS_FILE = Path("/tmp/leetcode-moved-paths")

          KEEP_AT_ROOT = {
              ".git",
              ".github",
              "LeetCode",
              "Baekjoon",
              "Programmers",
              "SWEA",
              "백준",
              "프로그래머스",
          }

          TOPICS_RE = re.compile(
              r"\n*<!---LeetCode Topics Start-->.*?<!---LeetCode Topics End-->\n*",
              re.DOTALL,
          )

          def move_problem_dirs():
              LEETCODE_DIR.mkdir(exist_ok=True)
              moved_paths = []

              for item in list(ROOT.iterdir()):
                  if not item.is_dir() or item.name.startswith("."):
                      continue

                  if item.name in KEEP_AT_ROOT:
                      continue

                  target = LEETCODE_DIR / item.name
                  if target.exists():
                      shutil.rmtree(target)

                  shutil.move(str(item), str(target))
                  moved_paths.append(item.name)
                  print(f"Moved {item} -> {target}")

              return moved_paths

          def move_readme_topics():
              root_readme = ROOT / "README.md"
              leetcode_readme = LEETCODE_DIR / "README.md"

              if not root_readme.exists():
                  return

              root_text = root_readme.read_text(encoding="utf-8")
              match = TOPICS_RE.search(root_text)
              if not match:
                  return

              topics = match.group(0).strip()
              topics = re.sub(r"(/tree/(?:main|master)/)(?!LeetCode/)", r"\1LeetCode/", topics)

              root_text = TOPICS_RE.sub("\n\n", root_text).rstrip() + "\n"
              root_readme.write_text(root_text, encoding="utf-8")

              if leetcode_readme.exists():
                  leetcode_text = leetcode_readme.read_text(encoding="utf-8")
                  if TOPICS_RE.search(leetcode_text):
                      leetcode_text = TOPICS_RE.sub(f"\n\n{topics}\n", leetcode_text).rstrip() + "\n"
                  else:
                      leetcode_text = leetcode_text.rstrip() + f"\n\n{topics}\n"
              else:
                  leetcode_text = f"# LeetCode\n\n{topics}\n"

              leetcode_readme.write_text(leetcode_text, encoding="utf-8")
              print("Moved LeetCode README topics into LeetCode/README.md")

          moved_paths = move_problem_dirs()
          move_readme_topics()
          MOVED_PATHS_FILE.write_text("\n".join(moved_paths), encoding="utf-8")

          if not moved_paths:
              print("No root LeetHub folders to move.")
          PY

      - name: Commit changes
        run: |
          git add -A -- LeetCode README.md

          if [[ -f /tmp/leetcode-moved-paths ]]; then
            while IFS= read -r path; do
              [[ -n "$path" ]] && git add -A -- "$path"
            done < /tmp/leetcode-moved-paths
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Move LeetCode files into LeetCode folder"
          git push
